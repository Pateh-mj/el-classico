<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation | El Classico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .hero-gradient { background: linear-gradient(135deg, #0c0a09, #44403c, #78350f); background-size: 400% 400%; animation: shift 12s ease infinite; }
        @keyframes shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="bg-stone-50">

<header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md py-4 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
        <a href="index.html" class="text-2xl font-bold text-amber-800 italic">El Classico</a>
        <a href="index.html" class="text-xs font-bold uppercase tracking-widest text-gray-500 hover:text-amber-800 transition">← Back to Site</a>
    </div>
</header>

<section class="hero-gradient min-h-[45vh] flex items-center justify-center text-white pt-20">
    <div class="text-center px-4">
        <h1 class="text-5xl md:text-6xl italic mb-4">Your Journey Begins</h1>
        <p class="text-amber-200/80 font-light">Complete the form below to secure your stay.</p>
    </div>
</section>

<section class="py-12 px-4 -mt-20 relative z-10">
    <form id="reserveForm" class="max-w-2xl mx-auto bg-white p-8 md:p-12 rounded-[2rem] shadow-2xl space-y-8">
        <div class="grid md:grid-cols-2 gap-8">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Guest Name</label>
                <input type="text" id="fullname" required class="w-full px-0 py-2 border-b-2 border-gray-100 focus:border-amber-600 transition outline-none text-lg">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Email</label>
                <input type="email" id="email" required class="w-full px-0 py-2 border-b-2 border-gray-100 focus:border-amber-600 transition outline-none text-lg">
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Check-In</label>
                <input type="date" id="checkin" required class="w-full px-0 py-2 border-b-2 border-gray-100 focus:border-amber-600 outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Check-Out</label>
                <input type="date" id="checkout" required class="w-full px-0 py-2 border-b-2 border-gray-100 focus:border-amber-600 outline-none">
            </div>
        </div>

        <div>
            <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Accommodation</label>
            <select id="roomtype" class="w-full px-0 py-2 border-b-2 border-gray-100 focus:border-amber-600 outline-none bg-transparent text-lg">
                <option value="Deluxe Room">Deluxe Room ($120/nt)</option>
                <option value="Luxury Suite">Luxury Suite ($200/nt)</option>
                <option value="Standard Room">Standard Room ($90/nt)</option>
            </select>
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-stone-900 text-amber-500 py-5 rounded-2xl font-bold text-xl hover:bg-black transition-all shadow-xl">
            Confirm My Stay
        </button>
    </form>
</section>

<div id="successModal" class="fixed inset-0 z-[100] hidden items-center justify-center px-4 bg-stone-950/80 backdrop-blur-md">
    <div class="bg-white rounded-[3rem] p-12 max-w-md w-full text-center shadow-2xl">
        <div class="w-20 h-20 bg-amber-50 text-amber-700 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
        </div>
        <h3 class="text-3xl font-bold mb-4 font-playfair">Reservation Sent</h3>
        <p class="text-gray-500 mb-10 leading-relaxed">Thank you for choosing <strong>El Classico</strong>. We've sent a detailed itinerary to your email.</p>
        <button onclick="window.location.href='index.html'" class="w-full bg-amber-800 text-white py-4 rounded-2xl font-bold shadow-lg shadow-amber-900/20">Return to Homepage</button>
    </div>
</div>

<script>
    // 1. Logic for dynamic check-out
    const checkin = document.getElementById('checkin');
    const checkout = document.getElementById('checkout');
    const today = new Date().toISOString().split('T')[0];
    checkin.min = today;
    
    checkin.onchange = () => {
        let minOut = new Date(checkin.value);
        minOut.setDate(minOut.getDate() + 1);
        checkout.min = minOut.toISOString().split('T')[0];
    };

    // 2. Room Pre-selector from Homepage
    const params = new URLSearchParams(window.location.search);
    if(params.get('room')) document.getElementById('roomtype').value = params.get('room');

    // 3. Form Submission
    document.getElementById('reserveForm').onsubmit = (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Securing Dates...";
        btn.disabled = true;
        setTimeout(() => {
            document.getElementById('successModal').classList.remove('hidden');
            document.getElementById('successModal').classList.add('flex');
        }, 1200);
    };
</script>
</body>
</html>
